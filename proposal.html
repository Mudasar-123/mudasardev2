<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Proposal Generator</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="proposal.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="nav">
    <h2 onclick="goHome()">Mudasar.dev</h2>
    <button onclick="goHome()">Back</button>
</nav>

<div class="container">

    <h2>Freelance Proposal Generator</h2>

    <!-- INPUT -->
    <textarea id="jobInput" placeholder="Paste job description here..."></textarea>

    <!-- OPTIONS -->
    <div class="options">
        <select id="tone">
            <option value="professional">Professional</option>
            <option value="friendly">Friendly</option>
            <option value="confident">Confident</option>
        </select>

        <button onclick="generateProposal()">Generate</button>
    </div>

    <!-- OUTPUT -->
    <div id="output">Your generated proposal will appear here...</div>

    <button class="copy-btn" onclick="copyText()">Copy Proposal</button>

</div>

<script src="proposal.js"></script>
</body>
</html>
